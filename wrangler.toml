name = "cloudflaresub"
main = "src/worker.js"
compatibility_date = "2026-03-06"
workers_dev = true

[[kv_namespaces]]
binding = "SUB_STORE"
id = "REPLACE_WITH_PRODUCTION_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/sub/*"]
